# =============================================================================
# Dependabot — automated dependency updates.
#
# Updates are batched into a single PR per ecosystem per week to avoid
# PR noise. Each update is set to "stability: weak" so pre-release
# versions are excluded (we only want stable releases).
#
# Configurable per-ecosystem:
#   - gradle: Kotlin/Java dependencies declared in libs.versions.toml
#   - github-actions: actions/* and other third-party actions
# =============================================================================

version: 2

updates:
  # ─────────────────────────────────────────────────────────────────────
  # Gradle (Kotlin/Java/Android) dependencies
  # ─────────────────────────────────────────────────────────────────────
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 5
    # Group minor/patch updates together to reduce PR count
    groups:
      # AndroidX libraries — usually backward-compatible
      androidx:
        patterns:
          - "androidx.*"
          - "com.google.android.material"
        update-types:
          - minor
          - patch
      # Kotlin + Coroutines — bump together
      kotlin:
        patterns:
          - "org.jetbrains.kotlin"
          - "org.jetbrains.kotlinx"
        update-types:
          - minor
          - patch
      # Compose — bump together (BOM controls most versions anyway)
      compose:
        patterns:
          - "androidx.compose.*"
        update-types:
          - minor
          - patch
      # Testing libraries
      testing:
        patterns:
          - "junit:junit"
          - "org.junit.*"
          - "androidx.test.*"
          - "io.mockk"
          - "app.cash.turbine"
          - "org.robolectric"
          - "com.google.truth"
        update-types:
          - minor
          - patch
    # Major version bumps get individual PRs for review
    # Ignore very noisy libraries that have known breaking-changes policies
    ignore:
      # AGP major versions require manual migration
      - dependency-name: "com.android.tools.build:gradle"
        update-types: ["version-update:semver-major"]
      # Kotlin major versions require compiler plugin updates
      - dependency-name: "org.jetbrains.kotlin:*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps(gradle)"
      include: scope
    labels:
      - dependencies
      - gradle

  # ─────────────────────────────────────────────────────────────────────
  # GitHub Actions versions
  # ─────────────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "actions/*"
          - "github/*"
      third-party:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/*"
          - "github/*"
    commit-message:
      prefix: "deps(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
