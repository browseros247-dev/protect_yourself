name: Setup Android Build Environment
description: Reusable composite action that sets up JDK 17, Android SDK 35, Gradle cache, and project local.properties. Used by all CI workflows to guarantee an identical toolchain.

inputs:
  gradle-cache-read-only:
    description: When true, the Gradle cache is mounted read-only (faster, no cache writeback). Set to false on release builds so they can write cache entries back for reuse.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    # ──────────────────────────────────────────────────────────────────────
    # 1. JDK 17 — matches the JVM target declared in app/build.gradle.kts
    #    (kotlinOptions.jvmTarget = "17" + sourceCompatibility 17).
    #    Using Temurin (Eclipse Adoptium) for stability and broad availability.
    # ──────────────────────────────────────────────────────────────────────
    - name: Set up JDK 17
      uses: actions/setup-java@v4.2.1
      with:
        distribution: temurin
        java-version: '17'

    # ──────────────────────────────────────────────────────────────────────
    # 2. Android SDK — the action pre-installs the SDK and accepts licenses.
    #    We pin build-tools and platform to versions compatible with AGP 8.7.2
    #    (compileSdk/targetSdk = 35, AGP 8.7.x requires build-tools 35.0.0).
    # ──────────────────────────────────────────────────────────────────────
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3.2.1
      with:
        packages: |
          tools
          platform-tools
          build-tools;35.0.0
          platforms;android-35

    # ──────────────────────────────────────────────────────────────────────
    # 3. Gradle cache — caches ~/.gradle/caches and .gradle across runs.
    #    Saves ~3-5 minutes on every build by avoiding re-downloading
    #    dependencies. The cache key includes gradle-wrapper.properties hash
    #    so cache is invalidated automatically on Gradle version bumps.
    # ──────────────────────────────────────────────────────────────────────
    - name: Cache Gradle dependencies and wrapper
      uses: actions/cache@v4.0.2
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          gradle-${{ runner.os }}-
        enable-cache: ${{ inputs.gradle-cache-read-only == 'false' }}

    # ──────────────────────────────────────────────────────────────────────
    # 4. Konan (Kotlin/Native) cache — used by some KMP dependencies.
    #    Cheap to keep, expensive to re-download.
    # ──────────────────────────────────────────────────────────────────────
    - name: Cache Konan (Kotlin/Native) dependencies
      uses: actions/cache@v4.0.2
      with:
        path: |
          ~/.konan
        key: konan-${{ runner.os }}-${{ hashFiles('**/libs.versions.toml') }}
        restore-keys: |
          konan-${{ runner.os }}-

    # ──────────────────────────────────────────────────────────────────────
    # 5. Write local.properties — tells Gradle where the Android SDK is.
    #    The setup-android action exposes it via ANDROID_SDK_ROOT.
    # ──────────────────────────────────────────────────────────────────────
    - name: Configure local.properties
      shell: bash
      run: |
        echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
        echo "Wrote local.properties with sdk.dir=${ANDROID_SDK_ROOT}"

    # ──────────────────────────────────────────────────────────────────────
    # 6. Make gradlew executable — sometimes lost on Windows checkouts.
    # ──────────────────────────────────────────────────────────────────────
    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x ./gradlew
